name: Feature
description: 새로운 기능을 추가합니다
title: "[Feat] "
labels:
  - feature

body:
  - type: markdown
    attributes:
      value: |
        ## 💡 Feature Issue
        추가하려는 기능과 관련된 정보를 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 설명
      description: 추가하려는 기능에 대해 간결하게 설명해주세요.
      placeholder: 예) 사용자가 여러 메일 계정을 통합해서 조회할 수 있는 기능을 추가합니다.
    validations:
      required: true

  - type: textarea
    id: work_details
    attributes:
      label: 작업 상세 내용
      description: 세부적으로 할 일들을 적어주세요.
      value: |
        - [ ] TODO
        - [ ] TODO
        - [ ] TODO
    validations:
      required: true

  - type: input
    id: related_issues
    attributes:
      label: 관련 Task
      description: 관련 Task를 입력해주세요.
      placeholder: 예) mailsangja/docs4capstone#2, mailsangja/docs4capstone#3
    validations:
      required: true

  - type: textarea
    id: additional_notes
    attributes:
      label: 추가 설명(선택)
      description: 부가적인 내용이 있다면 작성해주세요.
      placeholder: 구현 시 고려사항, 제약사항, 예상 리스크 등을 작성해주세요.
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 참고 자료(선택)
      description: 필요한 자료, 링크, 사진, 문서 등을 첨부해주세요.
      placeholder: 예) 설계 문서 링크, 참고 이미지, API 문서 등
    validations:
      required: false
name: Bug Report
description: 버그를 제보합니다
title: "[Bug] "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        ## 💡 Bug Report
        발생한 버그에 대해 구체적으로 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 설명
      description: 어떤 버그인지 간단하게 설명해주세요.
      placeholder: 예) 메일 목록 조회 시 특정 조건에서 500 에러가 발생합니다.
    validations:
      required: true

  - type: textarea
    id: bug_details
    attributes:
      label: 버그 상세 내용
      description: 버그가 발생한 상황, 결과 등을 자세하게 작성해주세요.
      placeholder: 버그 발생 배경과 전체 흐름을 작성해주세요.
    validations:
      required: true

  - type: textarea
    id: situation
    attributes:
      label: 상황
      description: API 경로나 입력값 등 주어진 조건을 설명해주세요.
      placeholder: |
        예)
        - API: GET /api/mails
        - Query Parameter: page=1&size=20
        - 입력값: accountId=null
        - 사용자 상태: 로그인 완료
    validations:
      required: true

  - type: textarea
    id: actual_result
    attributes:
      label: 실제 결과
      description: 오류 메시지 등 버그가 발생했을 때의 동작을 설명해주세요.
      placeholder: |
        예)
        - 500 Internal Server Error 발생
        - 콘솔에 NullPointerException 출력
        - 화면에 "알 수 없는 오류가 발생했습니다" 표시
    validations:
      required: true

  - type: textarea
    id: expected_result
    attributes:
      label: 예상 결과
      description: 정상적으로 동작했을 때의 결과를 설명해주세요.
      placeholder: |
        예)
        - 메일 목록이 정상 조회되어야 함
        - accountId가 없을 경우 전체 계정 기준으로 조회되어야 함
    validations:
      required: true

  - type: input
    id: related_issues
    attributes:
      label: 관련 Task
      description: 관련 Task를 입력해주세요.
      placeholder: 예) mailsangja/docs4capstone#2, mailsangja/docs4capstone#3
    validations:
      required: true

  - type: textarea
    id: additional_notes
    attributes:
      label: 추가 설명(선택)
      description: 부가적인 내용이 있다면 작성해주세요.
      placeholder: 재현 빈도, 우회 방법, 영향 범위 등을 작성해주세요.
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 참고 자료(선택)
      description: 필요한 자료나 사진을 첨부해주세요.
      placeholder: 예) 로그, 스크린샷, 관련 문서, 에러 캡처 등
    validations:
      required: false
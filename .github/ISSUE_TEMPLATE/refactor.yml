name: Refactor
description: 코드 리팩토링을 진행합니다
title: "[Refactor] "
labels:
  - refactor

body:
  - type: markdown
    attributes:
      value: |
        ## 💡 Refactor Issue
        리팩토링 대상과 목적을 구체적으로 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 설명
      description: 리팩토링할 내용에 대해 간단하게 설명해주세요.
      placeholder: 예) 중복된 인증 로직을 공통 모듈로 분리합니다.
    validations:
      required: true

  - type: textarea
    id: refactor_details
    attributes:
      label: 리팩토링 상세 내용
      description: 리팩토링이 필요한 이유와 방법 등을 자세하게 작성해주세요.
      placeholder: 리팩토링 배경, 범위, 접근 방법 등을 작성해주세요.
    validations:
      required: true

  - type: textarea
    id: current_state
    attributes:
      label: 현재 상황
      description: 현재 코드의 문제점이나 개선이 필요한 부분을 설명해주세요.
      placeholder: 예) 중복 코드가 여러 서비스에 흩어져 있어 유지보수가 어렵습니다.
    validations:
      required: true

  - type: textarea
    id: improvement_plan
    attributes:
      label: 개선 방안
      description: 어떻게 리팩토링할 것인지 설명해주세요.
      placeholder: 예) 공통 인터페이스를 도입하고, 인증 처리 로직을 별도 컴포넌트로 분리합니다.
    validations:
      required: true

  - type: textarea
    id: expected_result
    attributes:
      label: 예상 결과
      description: 리팩토링 후 기대되는 결과를 설명해주세요.
      placeholder: 예) 중복 코드 감소, 테스트 용이성 향상, 유지보수성 개선
    validations:
      required: true

  - type: input
    id: related_issues
    attributes:
      label: 관련 Task
      description: 관련 Task를 입력해주세요.
      placeholder: 예) mailsangja/docs4capstone#2, mailsangja/docs4capstone#3
    validations:
      required: true

  - type: textarea
    id: additional_notes
    attributes:
      label: 추가 설명(선택)
      description: 부가적인 내용이 있다면 작성해주세요.
      placeholder: 구현 시 유의사항이나 논의가 필요한 내용을 작성해주세요.
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 참고 자료(선택)
      description: 필요한 자료나 사진, 문서 링크 등을 첨부해주세요.
      placeholder: 예) 설계 문서, 관련 PR, 코드 링크, 참고 이미지
    validations:
      required: false